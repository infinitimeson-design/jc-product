<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JC Product — Photography</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
   <img src="assets/images/logo/logo-jc-final.png" alt="JC" class="nav__logo"> 
    <ul class="nav__links">
      <li><a href="#portfolio">Portfolio</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <img src="assets/images/logo/logo-jc-final.png" alt="JC" class="nav__logo">
    <div class="hero__content">
      <h1 class="hero__title">Captured Moments</h1>
      <p class="hero__sub">Fine Art Photography</p>
      <a href="#portfolio" class="btn">View Work</a>
    </div>
    <div class="hero__scroll">↓</div>
  </section>

  <!-- PORTFOLIO -->
  <section class="portfolio" id="portfolio">
    <h2 class="section__title">Portfolio</h2>
    <div class="grid">
      <div class="grid__item grid__item--wide">
        <img src="IMG_20260718_194855.jpg" alt="">
      </div>
      <div class="grid__item">
        <img src="IMG_20260719_035914.jpg" alt="">
      </div>
      <div class="grid__item">
        <img src="IMG_20260719_035921.jpg" alt="">
      </div>
      <div class="grid__item">
        <img src="IMG_20260719_035924.jpg" alt="">
      </div>
      <div class="grid__item">
        <img src="IMG_20260719_035926.jpg" alt="">
      </div>
      <div class="grid__item grid__item--wide">
        <img src="IMG_20260719_035930.jpg" alt="">
      </div>
      <div class="grid__item">
        <img src="IMG_20260719_035933.jpg" alt="">
      </div>
      <div class="grid__item">
        <img src="IMG_20260719_035935.jpg" alt="">
      </div>
      <div class="grid__item">
        <img src="IMG_20260719_035937.jpg" alt="">
      </div>
      <div class="grid__item">
        <img src="IMG_20260719_035940.jpg" alt="">
      </div>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="about" id="about">
    <div class="about__img">
      <img src="dc91dba0-7f83-4d6e-9a8d-e541df46d46c.png" alt="JC">
    </div>
    <div class="about__text">
      <h2 class="section__title">About</h2>
      <p>Visual storytelling through light, shadow, and authentic moments. Based in Italy, available worldwide.</p>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="contact" id="contact">
    <h2 class="section__title">Get in Touch</h2>
    <form class="form" id="contactForm">
      <input type="text" placeholder="Name" required>
      <input type="email" placeholder="Email" required>
      <textarea placeholder="Message" rows="5" required></textarea>
      <button type="submit" class="btn">Send</button>
    </form>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <img src="assets/images/logo/logo-jc-final.png" alt="JC" class="nav__logo">
    <p>© 2026 JC Product. All rights reserved.</p>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox__close" id="lbClose">✕</button>
    <button class="lightbox__prev" id="lbPrev">‹</button>
    <img class="lightbox__img" id="lbImg" src="" alt="">
    <button class="lightbox__next" id="lbNext">›</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
